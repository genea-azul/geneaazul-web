<section id="cronologia-section" class="ga-section container-xl" aria-label="Cronología de Azul">

    <h2 class="ga-section-title">Azul a través del tiempo</h2>
    <p class="ga-section-subtitle">Historia, genealogía y curiosidades de la ciudad de Azul.</p>

    <div class="ga-tl-filters" id="cronologia-filters" role="group" aria-label="Filtrar cronología por categoría">
      <button class="ga-tl-filter-btn active" data-filter="all" aria-pressed="true"><i class="bi bi-list-ul me-1"></i> Todo</button>
      <button class="ga-tl-filter-btn" data-filter="historia" aria-pressed="false"><i class="bi bi-book me-1"></i> Historia</button>
      <button class="ga-tl-filter-btn" data-filter="genealogia" aria-pressed="false"><i class="bi bi-diagram-3 me-1"></i> Genealogía</button>
      <button class="ga-tl-filter-btn" data-filter="curiosidades" aria-pressed="false"><i class="bi bi-patch-question me-1"></i> Curiosidades</button>
    </div>

    <div class="ga-tl-search-wrap ga-search-wrap">
      <input type="text" class="form-control form-control-sm" id="cronologia-search"
        placeholder="Buscar en títulos…" autocomplete="off" aria-label="Buscar en cronología por título">
      <button class="ga-search-clear" type="button" aria-label="Limpiar búsqueda">×</button>
    </div>

    <div id="cronologia-timeline">
      <!-- populated by cronologia.js -->
    </div>

</section>

<section class="ga-section container-xl" id="mapa-section" aria-label="Mapa migratorio">

  <div class="mb-4">
    <h2 class="ga-section-title">Mapa migratorio</h2>
    <p class="ga-section-subtitle">Países de origen de los inmigrantes registrados en el árbol de Azul. Hacé clic en un círculo para ver los detalles.</p>
  </div>

  <!-- Leaflet map container -->
  <div class="ga-leaflet-wrap mb-2">
    <div id="map-container"></div>
  </div>

  <!-- Legend -->
  <div class="d-flex flex-wrap gap-3 mb-5 justify-content-center">
    <div class="d-flex align-items-center gap-1 small">
      <span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:var(--ga-accent);opacity:.8"></span>
      <span class="text-muted">Mayor cantidad de inmigrantes</span>
    </div>
    <div class="d-flex align-items-center gap-1 small">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ga-accent);opacity:.5"></span>
      <span class="text-muted">Menor cantidad</span>
    </div>
  </div>

  <!-- List -->
  <div>
    <h4 class="mb-3">Listado completo por país</h4>
    <div id="map-list">
      <div class="ga-page-loading"><div class="spinner-border spinner-border-sm" role="status"></div><span>Cargando...</span></div>
    </div>
  </div>

</section>

<section class="ga-section container-xl" id="buscar-section" aria-label="Buscar personas">

  <div class="row justify-content-center">
    <div class="col-lg-9 col-xl-8">

      <!-- Page header -->
      <div class="mb-4">
        <h2 class="ga-section-title">Buscá personas en el árbol</h2>
        <p class="ga-section-subtitle">Ingresá el apellido y al menos un dato más para encontrar a quien buscás. Usá la búsqueda avanzada para agregar padres, pareja o abuelos.</p>
      </div>

      <!-- ═══ LOADING STATE ═══ -->
      <div id="search-loading-container" class="ga-server-status">
        <div class="spinner-border mb-3" role="status" id="search-spinner" style="visibility:hidden"><span class="visually-hidden">Cargando...</span></div>
        <div id="search-spinner-msg"></div>
      </div>

      <!-- ═══ SEARCH FORM ═══ -->
      <div id="search-form-container" class="d-none">

        <!-- ── STEP 1: Main person ── -->
        <div id="search-step-1">
          <div class="card ga-person-form-card" id="individualCard">
            <div class="card-header d-flex align-items-center gap-2">
              <i class="bi bi-person card-header-icon" id="individualCardIcon"></i>
              <span class="fw-bolder">Persona principal</span>
              <div class="btn-group btn-group-sm ms-auto ga-sex-toggle" role="group" aria-label="Sexo">
                <input type="radio" class="btn-check" name="individualSex" id="individualSexM" value="M" autocomplete="off">
                <label class="btn btn-outline-light" for="individualSexM"><i class="bi bi-gender-male"></i> Masc.</label>
                <input type="radio" class="btn-check" name="individualSex" id="individualSexF" value="F" autocomplete="off">
                <label class="btn btn-outline-light" for="individualSexF"><i class="bi bi-gender-female"></i> Fem.</label>
              </div>
            </div>
            <div class="card-body">
              <div class="row g-2">
                <div class="col-sm-6">
                  <label class="form-label small fw-semibold" for="individualGivenName">Nombre <span class="text-muted fw-normal">(requerido)</span></label>
                  <input type="text" class="form-control form-control-sm" id="individualGivenName" autocomplete="given-name">
                </div>
                <div class="col-sm-6">
                  <label class="form-label small fw-semibold" for="individualSurname">Apellido <span class="text-muted fw-normal">(requerido)</span></label>
                  <input type="text" class="form-control form-control-sm" id="individualSurname" autocomplete="family-name">
                </div>
                <div class="col-sm-4">
                  <label class="form-label small fw-semibold" for="individualYearOfBirth">Año de nacimiento</label>
                  <input type="number" class="form-control form-control-sm" id="individualYearOfBirth" min="1600" max="9999">
                </div>
                <div class="col-sm-4">
                  <label class="form-label small fw-semibold" for="individualYearOfDeath">Año de fallecimiento</label>
                  <input type="number" class="form-control form-control-sm" id="individualYearOfDeath" min="1600" max="9999" disabled>
                </div>
                <div class="col-sm-4 d-flex align-items-end pb-1">
                  <div class="form-check form-check-inline mb-0">
                    <input class="form-check-input" type="checkbox" id="individualIsAlive" checked>
                    <label class="form-check-label small" for="individualIsAlive">Vive</label>
                  </div>
                </div>
                <div class="col-sm-6">
                  <label class="form-label small fw-semibold" for="individualPlaceOfBirth">Lugar de nacimiento</label>
                  <input type="text" class="form-control form-control-sm" id="individualPlaceOfBirth">
                </div>
                <div class="col-sm-6">
                  <label class="form-label small fw-semibold" for="individualContact">Tu contacto <span class="text-muted fw-normal">(requerido)</span></label>
                  <input type="text" class="form-control form-control-sm" id="individualContact" placeholder="Email, WhatsApp o @instagram" required>
                </div>
              </div>
            </div>
          </div>

          <!-- Toggle advanced search -->
          <div class="text-center my-3">
            <button class="btn btn-outline-secondary btn-sm" type="button" id="advancedSearchToggle">
              <i class="bi bi-sliders me-1"></i>Búsqueda avanzada
              <i class="bi bi-chevron-down ms-1" id="advancedToggleIcon"></i>
            </button>
          </div>
        </div>
